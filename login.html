<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<link rel="stylesheet" href="./css/main.css">
</head>
<body>

<div class="card">
  <div class="left-panel">
    <div class="dots"></div>
    <svg viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
      <rect x="40" y="330" width="220" height="14" rx="4" fill="#3a3470"/>
      <rect x="60" y="260" width="160" height="14" fill="#caa472"/>
      <rect x="70" y="274" width="10" height="60" fill="#5a3a2a"/>
      <rect x="190" y="274" width="10" height="60" fill="#5a3a2a"/>
      <rect x="80" y="220" width="60" height="40" rx="4" fill="#2b2b3d"/>
      <circle cx="150" cy="170" r="35" fill="#f0b18c"/>
      <rect x="120" y="200" width="60" height="70" rx="20" fill="#f4e9d8"/>
      <circle cx="135" cy="165" r="8" fill="none" stroke="#222" stroke-width="2"/>
      <circle cx="165" cy="165" r="8" fill="none" stroke="#222" stroke-width="2"/>
    </svg>
  </div>

  <div class="right-panel">
    <div class="brand">EDU<span>-X</span></div>
    <div class="welcome">Welcome Back !</div>

    <form id="loginForm">
      <label for="email">EMAIL ID</label>
      <input id="email" type="email" placeholder="kunal@bvp.com" required>

      <label for="password">PASSWORD</label>
      <input id="password" type="password" placeholder="*********" required>

      <div class="forgot"><a href="#">Forgot Password ?</a></div>

      <button type="submit" class="loginpage-btn">Log In</button>
    </form>
    <p class="switch-link">Don't have an account? <a href="./signup.html">Sign up</a></p>
  </div>
</div>

<script src="./js/login.js"></script>
</body>
</html>
