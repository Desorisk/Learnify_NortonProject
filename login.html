<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<link rel="stylesheet" href="./css/main.css">
</head>
<body class="body_login">

<div class="card">
  <div class="left-panel">
    <div class="dots"></div>
    <img src="./public/login.png" alt="login-photo">
  </div>

  <div class="right-panel">
    <div class="brand">
      <img src="./public/Leanify logo (1).png" alt="">
    </div>
    <div class="welcome">Welcome Back !</div>

    <form id="loginForm">
      <label for="email">EMAIL ID</label>
      <input id="email" type="email" placeholder="example@gmail.com" required>

      <label for="password">PASSWORD</label>
      <input id="password" type="password" placeholder="*********" required>

      <div class="forgot"><a href="#">Forgot Password ?</a></div>

      <button type="submit" class="loginpage-btn">Log In</button>
    </form>
    <p class="switch-link">Don't have an account? <a href="./signup.html">Sign up</a></p>
  </div>
</div>

<script src="./js/login.js"></script>
</body>
</html>
