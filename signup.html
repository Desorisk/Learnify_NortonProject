<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up</title>
<link rel="stylesheet" href="./css/main.css">
<link rel="stylesheet" href="./css/pages/login.css">
<link rel="stylesheet" href="./css/pages/signup.css">
</head>
<body class="body_signup">

<div class="card">
  <div class="left-panel">
    <img src="./public/login.png" alt="login-photo">
  </div>

  <div class="right-panel">
    <div class="brand">
      <img src="./public/Leanify logo (1).png" alt="">
    </div>
    <div class="welcome">Create Account</div>

    <form id="signupForm">

      <div class="avatar-upload">
        <img id="avatarPreview" src="./public/default-avatar.png" alt="Photo">
        <label for="avatarInput" class="avatar-upload-label">Choose photo</label>
        <input type="file" id="avatarInput" accept="image/*" hidden>
      </div>

      <div class="name-row">
        <div>
          <label for="firstName">FIRST NAME</label>
          <input id="firstName" type="text" placeholder="first-name" required>
        </div>
        <div>
          <label for="lastName">LAST NAME</label>
          <input id="lastName" type="text" placeholder="last-name" required>
        </div>
      </div>

      <label for="signupEmail">EMAIL ID</label>
      <input id="signupEmail" type="email" placeholder="example@gmail.com" required>

      <label for="signupPassword">PASSWORD</label>
      <input id="signupPassword" type="password" placeholder="*********" required>

      <button type="submit" class="loginpage-btn">Sign Up</button>

      <p class="switch-link">Already have an account? <a href="./login.html">Log in</a></p>
    </form>
  </div>
</div>

<script src="./js/signup.js"></script>
</body>
</html>
